<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000" viewBox="0 0 1000 1000">
  <defs>
    <clipPath id="rounded-clip">
      <rect width="1000" height="1000" rx="160" ry="160"/>
    </clipPath>
    <filter id="text-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
  </defs>

  <g clip-path="url(#rounded-clip)">
    <!-- Swiss red background -->
    <rect width="1000" height="1000" fill="#D52B1E"/>

    <!-- Swiss cross (centered, scaled to ~400x400) -->
    <!-- Vertical bar -->
    <rect x="425" y="175" width="150" height="650" fill="white"/>
    <!-- Horizontal bar -->
    <rect x="175" y="425" width="650" height="150" fill="white"/>

    <!-- Subtle border -->
    <rect width="1000" height="1000" rx="160" ry="160" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="4"/>
  </g>
</svg>
