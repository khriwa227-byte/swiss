<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000" viewBox="0 0 1000 1000">
  <defs>
    <radialGradient id="bg1" cx="0%" cy="0%" r="70%">
      <stop offset="0%" stop-color="hsl(305,100%,70%)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="bg2" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="hsl(285,100%,60%)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="bg3" cx="100%" cy="50%" r="70%">
      <stop offset="0%" stop-color="hsl(270,100%,50%)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="bg4" cx="0%" cy="100%" r="70%">
      <stop offset="0%" stop-color="hsl(260,100%,40%)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="bg5" cx="100%" cy="100%" r="70%">
      <stop offset="0%" stop-color="hsl(305,100%,70%)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="diamond-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.85)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="text-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
    <clipPath id="rounded-clip">
      <rect width="1000" height="1000" rx="160" ry="160"/>
    </clipPath>
  </defs>

  <!-- Clipped container with rounded corners -->
  <g clip-path="url(#rounded-clip)">
    <!-- Base background -->
    <rect width="1000" height="1000" fill="#0002ff"/>

    <!-- Gradient layers matching website -->
    <rect width="1000" height="1000" fill="url(#bg1)"/>
    <rect width="1000" height="1000" fill="url(#bg2)"/>
    <rect width="1000" height="1000" fill="url(#bg3)"/>
    <rect width="1000" height="1000" fill="url(#bg4)"/>
    <rect width="1000" height="1000" fill="url(#bg5)"/>

    <!-- Subtle glass overlay -->
    <rect width="1000" height="1000" fill="rgba(0,0,0,0.15)"/>

    <!-- Diamond icon (from favicon, scaled up) -->
    <g filter="url(#glow)">
      <rect x="395" y="240" width="210" height="210" rx="12" fill="url(#diamond-gradient)" transform="rotate(45 500 345)" opacity="0.95"/>
    </g>

    <!-- Brand name -->
    <g filter="url(#text-shadow)">
      <text x="500" y="600" text-anchor="middle" font-family="'Figtree', 'Inter', 'Segoe UI', Arial, sans-serif" font-weight="800" font-size="108" fill="#ffffff" letter-spacing="-2">
        Prime<tspan fill="rgba(255,255,255,0.9)">Kopen</tspan>TV
      </text>
    </g>

    <!-- Tagline -->
    <text x="500" y="670" text-anchor="middle" font-family="'Figtree', 'Inter', 'Segoe UI', Arial, sans-serif" font-weight="400" font-size="38" fill="rgba(255,255,255,0.85)" letter-spacing="6">
      PREMIUM IPTV
    </text>

    <!-- Subtle border inside rounded corners -->
    <rect width="1000" height="1000" rx="160" ry="160" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="4"/>
  </g>
</svg>
