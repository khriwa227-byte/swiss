<svg xmlns="http://www.w3.org/2000/svg" width="640" height="340" viewBox="0 0 640 340">
  <defs>
    <radialGradient id="bg1" cx="0%" cy="0%" r="80%">
      <stop offset="0%" stop-color="hsl(305,100%,70%)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="bg2" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="hsl(285,100%,60%)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="bg3" cx="100%" cy="50%" r="70%">
      <stop offset="0%" stop-color="hsl(270,100%,50%)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="bg4" cx="0%" cy="100%" r="70%">
      <stop offset="0%" stop-color="hsl(260,100%,40%)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="bg5" cx="100%" cy="100%" r="70%">
      <stop offset="0%" stop-color="hsl(190,100%,50%)" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="diamond-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.8)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="text-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.35)"/>
    </filter>
  </defs>

  <!-- Base background -->
  <rect width="640" height="340" fill="#0002ff"/>

  <!-- Gradient layers -->
  <rect width="640" height="340" fill="url(#bg1)"/>
  <rect width="640" height="340" fill="url(#bg2)"/>
  <rect width="640" height="340" fill="url(#bg3)"/>
  <rect width="640" height="340" fill="url(#bg4)"/>
  <rect width="640" height="340" fill="url(#bg5)"/>

  <!-- Subtle overlay -->
  <rect width="640" height="340" fill="rgba(0,0,0,0.1)"/>

  <!-- Decorative grid lines -->
  <line x1="40" y1="0" x2="40" y2="340" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="340" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="0" y1="30" x2="640" y2="30" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="0" y1="310" x2="640" y2="310" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Diamond icon (centered above text) -->
  <g filter="url(#glow)" transform="translate(320, 85)">
    <rect x="-35" y="-35" width="70" height="70" rx="5" fill="url(#diamond-grad)" transform="rotate(45 0 0)" opacity="0.9"/>
  </g>

  <!-- Brand name (centered) -->
  <g filter="url(#text-shadow)">
    <text x="320" y="185" text-anchor="middle" font-family="'Figtree', 'Inter', 'Segoe UI', Arial, sans-serif" font-weight="800" font-size="56" fill="#ffffff" letter-spacing="-2">
      PrimeKopenTV
    </text>
  </g>

  <!-- Tagline (centered) -->
  <text x="320" y="218" text-anchor="middle" font-family="'Figtree', 'Inter', 'Segoe UI', Arial, sans-serif" font-weight="600" font-size="16" fill="rgba(255,255,255,0.75)" letter-spacing="4">
    PREMIUM IPTV VOOR IEDEREEN
  </text>

  <!-- Feature pills (centered row) -->
  <g font-family="'Figtree', 'Inter', 'Segoe UI', Arial, sans-serif" font-weight="700" font-size="10">
    <!-- Pill 1 -->
    <rect x="112" y="248" width="105" height="26" rx="13" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="164" y="265" text-anchor="middle" fill="rgba(255,255,255,0.9)" letter-spacing="1">65.000+ ZENDERS</text>

    <!-- Pill 2 -->
    <rect x="227" y="248" width="80" height="26" rx="13" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="267" y="265" text-anchor="middle" fill="rgba(255,255,255,0.9)" letter-spacing="1">HD &amp; 4K</text>

    <!-- Pill 3 -->
    <rect x="317" y="248" width="90" height="26" rx="13" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="362" y="265" text-anchor="middle" fill="rgba(255,255,255,0.9)" letter-spacing="1">SPORT LIVE</text>

    <!-- Pill 4 -->
    <rect x="417" y="248" width="110" height="26" rx="13" fill="rgba(236,72,153,0.5)" stroke="rgba(236,72,153,0.6)" stroke-width="1"/>
    <text x="472" y="265" text-anchor="middle" fill="#ffffff" letter-spacing="1">FILMS &amp; SERIES</text>
  </g>
</svg>
