    <style>
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: 'Figtree', sans-serif;
        color: #0D1B3E;
        overflow-x: hidden;
        background-color: #F5F5F5;
        background-image:
          radial-gradient(at 0% 0%, rgba(33,70,139,0.08) 0, transparent 60%),
          radial-gradient(at 100% 0%, rgba(174,28,40,0.06) 0, transparent 60%),
          radial-gradient(at 50% 100%, rgba(33,70,139,0.06) 0, transparent 60%);
        background-attachment: fixed;
        background-size: cover;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(33, 70, 139, 0.15);
      }
      .glass-card-dark {
        background: rgba(13, 27, 62, 0.88);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(33, 70, 139, 0.4);
      }
      .text-italics {
        font-style: italic;
        font-weight: 300;
      }
      .marquee-container {
        display: flex;
        overflow: hidden;
        user-select: none;
        gap: 2rem;
      }
      .marquee-content {
        flex-shrink: 0;
        display: flex;
        justify-content: space-around;
        gap: 2rem;
        min-width: 100%;
        animation: scroll 40s linear infinite;
      }
      @keyframes scroll {
        from { transform: translateX(0); }
        to { transform: translateX(calc(-100% - 2rem)); }
      }
      @keyframes popIn {
        0% { opacity: 0; transform: scale(0.5) translateY(10px); }
        70% { transform: scale(1.05) translateY(-2px); }
        100% { opacity: 1; transform: scale(1) translateY(0); }
      }
      .grid-line {
        position: fixed;
        top: 0;
        bottom: 0;
        width: 1px;
        background-color: rgba(33,70,139,0.12);
        z-index: -1;
      }
      .grid-line-left { left: 5%; }
      .grid-line-right { right: 5%; }
      
      .reveal {
        opacity: 0;
        transform: translateY(20px);
        transition: all 0.8s ease-out;
      }
      .reveal.active {
        opacity: 1;
        transform: translateY(0);
      }
      
      @keyframes bounceX {
        0%, 100% { transform: translateX(0); }
        50% { transform: translateX(4px); }
      }
      @keyframes bannerShimmer {
        0% { background-position: -400% center; }
        100% { background-position: 400% center; }
      }
      @keyframes badgePulse {
        0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(174,28,40,0.7); }
        50% { transform: scale(1.08); box-shadow: 0 0 0 6px rgba(174,28,40,0); }
      }
      @keyframes textFlicker {
        0%, 90%, 100% { opacity: 1; }
        95% { opacity: 0.7; }
      }
      @keyframes slideInDown {
        from { transform: translateY(-100%); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      .banner-bg {
        background: linear-gradient(90deg, #1a3a7a, #21468B, #AE1C28, #21468B, #1a3a7a);
        background-size: 300% auto;
        animation: bannerShimmer 6s linear infinite;
      }
      .banner-badge {
        animation: badgePulse 1.8s ease-in-out infinite;
        display: inline-block;
      }
      .banner-text {
        animation: textFlicker 4s ease-in-out infinite;
      }
      .banner-wrap {
        animation: slideInDown 0.5s ease-out both;
      }
      @keyframes shimmer {
        0% { background-position: -200% center; }
        100% { background-position: 200% center; }
      }
      @keyframes pulseGlow {
        0%, 100% { box-shadow: 0 0 20px rgba(174,28,40,0.4), 0 0 40px rgba(174,28,40,0.2); }
        50% { box-shadow: 0 0 30px rgba(174,28,40,0.6), 0 0 60px rgba(174,28,40,0.35); }
      }
      .btn-claim {
        background: linear-gradient(135deg, #AE1C28, #c0392b, #8B0F1E, #c0392b, #AE1C28);
        background-size: 200% auto;
        animation: shimmer 3s linear infinite, pulseGlow 2s ease-in-out infinite;
      }
      .btn-claim:hover {
        transform: scale(1.05);
        box-shadow: 0 0 40px rgba(174,28,40,0.6), 0 0 80px rgba(174,28,40,0.3);
      }
      @media (max-width: 1024px) {
        .grid-line { display: none; }
      }
